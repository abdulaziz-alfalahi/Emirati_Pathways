<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Rescue</title>
</head>

<body>
    <h1>PWA Rescue Page</h1>
    <p>Attempting to unregister Service Workers...</p>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (registrations) {
                for (let registration of registrations) {
                    console.log('Rescue: Unregistering', registration);
                    registration.unregister().then(function (boolean) {
                        document.body.innerHTML += '<p>Unregistered: ' + boolean + '</p>';
                    });
                }
                if (registrations.length === 0) {
                    document.body.innerHTML += '<p>No Service Workers found.</p>';
                }

                // Clear Caches
                caches.keys().then(function (names) {
                    for (let name of names) {
                        caches.delete(name);
                        document.body.innerHTML += '<p>Deleted Cache: ' + name + '</p>';
                    }
                    setTimeout(() => {
                        document.body.innerHTML += '<p>Done. <a href="/">Return to Home</a></p>';
                    }, 1000);
                });
            });
        } else {
            document.body.innerHTML = 'Service Workers not supported.';
        }
    </script>
</body>

</html>
