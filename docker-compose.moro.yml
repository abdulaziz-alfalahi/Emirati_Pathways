# ===========================================================
# Emirati Human Development Platform — Docker Compose (Moro)
# Stack: Frontend (Nginx) + Backend (Gunicorn) + Redis
# Database: External Moro PostgreSQL 18.3 at 10.228.145.66:5454
# ===========================================================
#
# Usage:
#   docker-compose -f docker-compose.moro.yml up -d
#   docker-compose -f docker-compose.moro.yml logs -f backend
#   docker-compose -f docker-compose.moro.yml down
#
# First-time setup:
#   1. Copy backend/.env.moro.template to backend/.env and fill in secrets
#   2. Run: docker-compose -f docker-compose.moro.yml up -d
#   3. Run DB seed: docker-compose -f docker-compose.moro.yml exec backend python setup_database.py
#

services:
  # --- Redis Cache & Message Queue ---
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - platform

  # --- Flask Backend (Gunicorn + gevent) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-dghr_prod}:${DB_PASSWORD}@${DB_HOST:-10.228.145.66}:${DB_PORT:-5454}/${DB_NAME:-dghr_prod}
      DB_HOST: ${DB_HOST:-10.228.145.66}
      DB_PORT: ${DB_PORT:-5454}
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD}@redis:6379/0
      USE_REDIS: "true"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://emirati.ehrdc.gov.ae,http://emirati.ehrdc.gov.ae,http://10.228.145.3,http://10.228.145.6}
    ports:
      - "5005:5005"
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "db-master:10.228.145.66"
    volumes:
      - upload_data:/app/uploads
    networks:
      - platform

  # --- React Frontend (Nginx) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - platform

volumes:
  redis_data:
    driver: local
  upload_data:
    driver: local

networks:
  platform:
    driver: bridge
