# =============================================================================
# Emirati Pathway Platform — Staging Reverse Proxy (APPDEV)
# =============================================================================
# Receives traffic from: WAF VIP (10.228.145.229) directly on port 443
# External chain: Internet → WAF (213.42.53.236) → WAF VIP (10.228.145.229:443)
#                 → this server (:443)
#
# SSL termination happens at the WAF, so this config expects plain HTTP
# on port 443 (unless SSL cert is also installed locally — adjust as needed).
#
# NOTE: If the WAF terminates SSL and forwards as HTTP, change "listen 443 ssl"
# to "listen 443" and remove ssl_certificate directives. Confirm with MORO.
# =============================================================================

server {
    listen 443 ssl;
    server_name stg-emirati.ehrdc.gov.ae;

    # --- SSL Configuration ---
    # Update these paths once the wildcard cert is installed
    ssl_certificate     /etc/nginx/ssl/ehrdc.gov.ae.crt;
    ssl_certificate_key /etc/nginx/ssl/ehrdc.gov.ae.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # --- Logging ---
    access_log /var/log/nginx/emirati-stg-access.log;
    error_log  /var/log/nginx/emirati-stg-error.log;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- API Proxy ---
    location /api/ {
        proxy_pass http://127.0.0.1:5005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    # --- Health ---
    location /health {
        proxy_pass http://127.0.0.1:5005/health;
        proxy_set_header Host $host;
    }

    # --- WebSocket proxy (Socket.IO) ---
    # MUST come before "location /" so it is not swallowed by the Vite catch-all.
    # Carries notification presence AND the WebRTC P2P signaling relay
    # (join / peer-joined / offer / answer / ice-candidate). Without this block,
    # /socket.io/ was proxied to the Vite dev server (:8089) and never reached
    # Flask-SocketIO (:5005), so each participant only saw their own camera.
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # --- LiveKit WebRTC signaling (primary video path) ---
    location /rtc {
        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # --- LiveKit twirp (room/token RPC) ---
    location /twirp {
        proxy_pass http://127.0.0.1:7880;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Frontend (Vite dev on staging, or dist for production-like staging) ---
    location / {
        # Option A: Proxy to Vite dev server (current APPDEV setup)
        proxy_pass http://127.0.0.1:8089;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        # Option B: Serve static build (uncomment to switch)
        # root /home/aalfalahi.d/Emirati_Pathways/frontend/dist;
        # index index.html;
        # try_files $uri $uri/ /index.html;
    }

    client_max_body_size 50M;
}
