# =============================================================================
# Emirati Pathway Platform — Production Web Server (APP01/APP02)
# =============================================================================
# Receives traffic from: dghr-web-vip (10.228.145.6) on port 80
# External chain: Internet → WAF (213.42.53.236) → WAF VIP (10.228.145.229:443)
#                 → LB (10.228.145.6:80) → this server (:80)
#
# Install: sudo cp emirati-web.conf /etc/nginx/sites-available/emirati-web
#          sudo ln -s /etc/nginx/sites-available/emirati-web /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

server {
    listen 80;
    server_name emirati.ehrdc.gov.ae;

    # --- Logging ---
    access_log /var/log/nginx/emirati-web-access.log;
    error_log  /var/log/nginx/emirati-web-error.log;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://stg-id.uaepass.ae https://id.uaepass.ae;" always;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # --- API Proxy (route /api/* to Flask backend) ---
    location /api/ {
        proxy_pass http://127.0.0.1:5005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;

        # CORS headers are handled by Flask, don't duplicate
    }

    # --- Health Check (for LB probing) ---
    location /health {
        proxy_pass http://127.0.0.1:5005/health;
        proxy_set_header Host $host;
    }

    # --- Static Frontend (Vite production build) ---
    root /home/aalfalahi.d/Emirati_Pathways/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Static Asset Caching ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- File Upload Limits ---
    client_max_body_size 50M;
}
