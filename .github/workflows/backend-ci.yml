name: Backend CI

on:
  push:
    branches: [main, develop, production-readiness]
    paths: ['backend/**']
  pull_request:
    branches: [main, production-readiness]
    paths: ['backend/**']

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_emirati
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lint (flake8)
        run: |
          cd backend
          pip install flake8
          flake8 app.py --max-line-length=150 --count --statistics

      - name: Provision database schema
        # The Postgres service starts empty. Tests exercise raw-SQL tables (offers,
        # job_postings, hr_profiles, interview/video sessions, …) that db.create_all()
        # does NOT create — only the ORM subset. migrate.py is the declarative,
        # idempotent provisioner: it reads DATABASE_SCHEMA.md (the single source of
        # truth) and converges the DB. Its uuid_generate_v4() DEFAULTs need uuid-ossp.
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: test_emirati
          DB_USER: test_user
          DB_PASSWORD: test_pass
        run: |
          cd backend
          python - <<'PY'
          import os, psycopg2
          conn = psycopg2.connect(
              host=os.environ["DB_HOST"], port=os.environ["DB_PORT"],
              dbname=os.environ["DB_NAME"], user=os.environ["DB_USER"],
              password=os.environ["DB_PASSWORD"],
          )
          conn.autocommit = True
          with conn.cursor() as cur:
              cur.execute('CREATE EXTENSION IF NOT EXISTS "uuid-ossp"')
          conn.close()
          print("uuid-ossp extension ready")
          PY
          python migrate.py

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_emirati
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
          DASHSCOPE_API_KEY: fake-key-for-ci
          FLASK_ENV: testing
          USE_REDIS: "false"
        run: |
          cd backend
          pip install pytest
          python -m pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t platform-backend ./backend
