name: Frontend CI

on:
  # Manual trigger. paths filters do not apply to workflow_dispatch,
  # so this is the way to exercise a CI change on demand.
  workflow_dispatch:
  push:
    branches: [main, develop, production-readiness]
    paths: ['frontend/**', '.github/workflows/frontend-ci.yml']
  pull_request:
    branches: [main, production-readiness]
    paths: ['frontend/**', '.github/workflows/frontend-ci.yml']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: TypeScript type check
        run: cd frontend && npx tsc --noEmit

      - name: Build production bundle
        run: cd frontend && npm run build

      # frontend/Dockerfile does `COPY dist/` and dist/ is gitignored, so the
      # image can only be built from a bundle produced by this job. `needs:`
      # alone does NOT carry it across — each job gets a fresh runner.
      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1
          if-no-files-found: error

      - name: Run tests
        run: cd frontend && npm test -- --run

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      # Without this the job fails at Dockerfile:9 with `"/dist": not found`,
      # because dist/ is gitignored and a fresh checkout never contains it.
      # This job has therefore NEVER passed on any PR touching frontend/** — it
      # was red on #82, #84 and #85 alike, which is exactly how a permanently
      # failing check stops being read.
      - name: Download production bundle
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Verify the bundle is present
        run: |
          test -f frontend/dist/index.html \
            || { echo "::error::frontend/dist/index.html missing — the bundle did not transfer"; exit 1; }
          echo "bundle files: $(find frontend/dist -type f | wc -l)"

      - name: Build Docker image
        run: docker build -t platform-frontend ./frontend
