# =============================================================================
# LiveKit Server Configuration
# =============================================================================

port: 7880
rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: true

keys:
  devkey: devsecret32charslongsecurityvalue

room:
  auto_create: true
  empty_timeout: 300        # 5 min after last participant leaves
  max_participants: 10

webhook:
  urls:
    - "http://egress-webhook:8003/webhook/egress"
  api_key: devkey

logging:
  level: info
  pion_level: warn

turn:
  enabled: true
  udp_port: 3478
  tls_port: 0
