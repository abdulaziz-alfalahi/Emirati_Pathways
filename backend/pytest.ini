[pytest]
testpaths = backend/tests
# Disable pytest's global output capture. Importing the app starts background daemon
# threads (video storage / QA workers, etc.) and touches file descriptors; under the
# default tmpfile capture that intermittently raises "ValueError: I/O operation on closed
# file" during collection and aborts the entire session. Running without capture avoids it.
addopts = --capture=no
markers =
    smoke: Quick smoke tests that verify basic imports and setup
    unit: Unit tests for individual functions/methods
    integration: Integration tests requiring database or external services
